repos:
    - repo: local
      hooks:
          - id: mypy
            name: mypy
            entry: uv run --frozen mypy
            language: system
            types: [python]
            pass_filenames: true
            always_run: true

          - id: pytest
            name: pytest
            entry: uv run pytest
            language: system
            pass_filenames: false
            always_run: true
